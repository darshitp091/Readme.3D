<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>README.3D - AI Documentation Generator</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Adsterra Ads Integration -->
    <script type="text/javascript">
      (function() {
        // Vite will replace these placeholders during the build process
        // if the environment variables are set.
        var popunder = "%VITE_ADSTERRA_POPUNDER_URL%";
        var socialbar = "%VITE_ADSTERRA_SOCIALBAR_URL%";
        
        // Safety check: If Vite didn't replace the placeholders (they still contain the variable name)
        // or if they are empty, or if they contain placeholder text, we don't try to load them.
        function isValid(url) {
          if (!url) return false;
          if (url.includes('VITE_ADSTERRA')) return false;
          if (url.includes('your_') && url.includes('_here')) return false;
          if (url === "") return false;
          return true;
        }

        if (!isValid(popunder)) popunder = null;
        if (!isValid(socialbar)) socialbar = null;

        console.log('[Adsterra] Script URLs detected:', { 
          popunder: popunder ? 'Detected' : 'Missing', 
          socialbar: socialbar ? 'Detected' : 'Missing' 
        });

        if (popunder) {
          var s = document.createElement('script');
          s.src = popunder;
          s.async = true;
          s.onerror = function() { console.error('[Adsterra] Failed to load Popunder script from:', popunder); };
          document.body.appendChild(s);
        }
        
        if (socialbar) {
          var s = document.createElement('script');
          s.src = socialbar;
          s.async = true;
          s.onerror = function() { console.error('[Adsterra] Failed to load Social Bar script from:', socialbar); };
          document.body.appendChild(s);
        }
      })();
    </script>
  </body>
</html>
